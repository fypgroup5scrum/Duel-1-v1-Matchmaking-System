<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPS Arena - Enlistment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  
  <style>
    body {
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1, h5, .btn-gaming {
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .register-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 450px;
      position: relative;
    }

    .register-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #e94560, #950740);
      border-radius: 20px 20px 0 0;
    }

    .brand-title {
      color: #e94560;
      text-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .form-label {
      color: #e94560;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-left: 5px;
    }

    .form-control {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white !important;
      padding: 12px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .form-control:focus {
      background: rgba(0, 0, 0, 0.4);
      border-color: #e94560;
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
      outline: none;
    }

    .btn-gaming {
      background: linear-gradient(45deg, #e94560, #950740);
      border: none;
      color: white;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .btn-gaming:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(233, 69, 96, 0.5);
      filter: brightness(1.2);
    }

    .login-link {
      color: #00d2ff;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .login-link:hover {
      text-shadow: 0 0 10px #00d2ff;
    }

    .status-msg {
      font-size: 0.8rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <h1 class="brand-title">RECRUITMENT</h1>
    <p class="status-msg">CREATE YOUR GLOBAL COMBAT IDENTIFICATION</p>

    <form action="register_process.php" method="POST" onsubmit="return validateForm()">
      
      <div class="mb-3">
        <label class="form-label">Codename (Username)</label>
        <input type="text" name="username" id="username" class="form-control" placeholder="" required/>
      </div>

      <div class="mb-3">
        <label class="form-label">Neural Link (Email)</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="" required/>
      </div>

      <div class="mb-4">
        <label class="form-label">Security Key (Password)</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="" required/>
      </div>

      <button type="submit" class="btn btn-gaming w-100 mb-4">
        CONFIRM ENLISTMENT
      </button>

      <p class="text-center small mb-0 text-white-50">
        Already a veteran? <a href="login_page.html" class="login-link">Access Login</a>
      </p>
    </form>
  </div>

  <script>
    function validateForm() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !email || !password) {
        alert('ALERT: Incomplete Data Fields Detected.');
        return false;
      }
      
      if (password.length < 6) {
        alert('ALERT: Security Key too weak. Minimum 6 characters required.');
        return false;
      }

      return true;
    }
  </script>

</body>
</html>
