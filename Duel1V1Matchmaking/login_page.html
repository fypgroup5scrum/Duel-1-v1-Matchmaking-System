<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPS Arena - Authentication</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg);
      bottom: -50%;
      z-index: -1;
    }
    h1, h5, .btn-gaming {
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      width: 420px;
      position: relative;
      animation: fadeIn 0.8s ease-out;
      z-index: 10;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      border-radius: 20px 20px 0 0;
      pointer-events: none;
    }
    .form-label {
      color: #00d2ff;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    .form-control {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px 15px;
      border-radius: 10px;
      transition: 0.3s;
    }
    .form-control:focus {
      background: rgba(0, 0, 0, 0.5);
      border-color: #00d2ff;
      color: white;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
      outline: none;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.3); }
    .btn-gaming {
      background: linear-gradient(45deg, #00d2ff, #3a7bd5);
      border: none;
      color: white;
      padding: 14px;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 2px;
      width: 100%;
      margin-top: 15px;
      transition: 0.3s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-gaming:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
      filter: brightness(1.1);
    }
    .brand-title {
      color: #00d2ff;
      text-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
      font-weight: 700;
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 5px;
    }
    .links-container {
      margin-top: 25px;
      text-align: center;
      font-size: 0.85rem;
      position: relative;
      z-index: 20;
    }
    .custom-link {
      color: #3a7bd5;
      text-decoration: none;
      transition: 0.3s;
      font-weight: 500;
    }
    .custom-link:hover {
      color: #00d2ff;
      text-shadow: 0 0 8px #00d2ff;
    }
    .loader {
      display: none;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="login-card">
    <h1 class="brand-title">RPS ARENA</h1>
    <h5 class="text-center mb-4 text-white-50" style="font-size: 0.8rem; letter-spacing: 1px;">System Access Required</h5>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control">
    </div>

    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control">
    </div>

    <button class="btn-gaming" onclick="handleLogin()">
      <div id="btn-loader" class="loader"></div>
      <span id="btn-text">LOGIN</span>
    </button>

    <div class="links-container">
      <p class="mb-2 text-white-50">
        New Player ? <a href="register.html" class="custom-link">Register Account</a>
      </p>
      <p class="mb-2">
        <a href="forgot_password.php" class="custom-link">Forgot Password?</a>
      </p>
      <p class="mb-0 mt-3 pt-2 border-top border-secondary" style="border-color: rgba(255,255,255,0.1) !important;">
        <a href="index.php" class="custom-link" style="font-size: 0.8rem; letter-spacing: 0.5px;">⬅ Back to Home</a>
      </p>
    </div>
  </div>

  <script>
    function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btnText  = document.getElementById('btn-text');
      const btnLoader = document.getElementById('btn-loader');

      if (!email || !password) {
        alert('Please fill in all fields.');
        return;
      }

      btnText.textContent = 'AUTHENTICATING...';
      btnLoader.style.display = 'block';

      fetch('login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
      })
      .then(r => r.text())
      .then(data => {
        if (data.trim() === 'success') {
          window.location.href = 'home.php';
        } else if (data.trim() === 'wrong_password') {
          alert('Access Denied: Wrong password.');
          btnText.textContent = 'LOGIN';
          btnLoader.style.display = 'none';
        } else if (data.trim() === 'user_not_found') {
          alert('Access Denied: Account not found.');
          btnText.textContent = 'LOGIN';
          btnLoader.style.display = 'none';
        } else {
          alert('System Error: Unexpected response.');
          btnText.textContent = 'LOGIN';
          btnLoader.style.display = 'none';
        }
      })
      .catch(err => {
        alert('System Error: Server connection failed.');
        btnText.textContent = 'LOGIN';
        btnLoader.style.display = 'none';
      });
    }
  </script>

</body>
</html>
