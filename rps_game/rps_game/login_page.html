<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

  <div style="width:360px;">
    <h5 class="mb-3">Sign in</h5>

    <label class="form-label">Email</label>
    <input type="email" id="email" class="form-control mb-3" placeholder="ali@gmail.com"/>

    <label class="form-label">Password</label>
    <input type="password" id="password" class="form-control mb-3" placeholder="pass123"/>

    <button class="btn btn-dark w-100 mb-3" onclick="handleLogin()">Sign in</button>

    <p class="text-center small mb-0">
      No account? <a href="register.html">Register</a>
    </p>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Please fill in all fields.');
        return;
      }

      // Changed to relative path 'login.php' to prevent connection errors
      fetch("login.php", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
      })
      .then(response => response.text())
      .then(data => {
        if (data.trim() === "success") {
          alert("Login successful!");
          window.location.href = "home.php";
        } else {
          alert("Email or password error");
        }
      })
      .catch(error => {
        console.error("Fetch Error:", error);
        alert("Error connecting to server. Make sure Apache and MySQL are running.");
      });
    }
  </script>
</body>
</html>
