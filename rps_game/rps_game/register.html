<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

  <!-- Tukar ke <form> supaya boleh hantar data ke backend -->
  <form action="register_process.php" method="POST" style="width:360px;" class="bg-white p-4 shadow-sm rounded" onsubmit="return validateForm()">
    <h5 class="mb-4 text-center">Register Account</h5>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" id="username" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" id="email" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" id="password" class="form-control" required/>
    </div>

    <button type="submit" class="btn btn-dark w-100 mb-3">Register</button>

    <p class="text-center small mb-0">
      Already have an account? <a href="login_page.html">Login</a>
    </p>
  </form>

  <script>
    function validateForm() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !email || !password) {
        alert('Please fill in all fields.');
        return false; // Halang form daripada dihantar
      }
      return true; // Teruskan penghantaran ke register_process.php
    }
  </script>

</body>
</html>
